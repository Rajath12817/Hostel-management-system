<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hostel Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=80&q=80" alt="Campus">
            <div>
                <strong>HostelOps</strong>
                <span id="roleLabel">Dashboard</span>
            </div>
        </div>
        <nav id="sidebarNav" class="nav flex-column"></nav>
    </aside>

    <main class="main-content">
        <nav class="topbar">
            <div>
                <p class="eyebrow mb-1">Hostel Management System</p>
                <h1 id="pageTitle">Dashboard</h1>
            </div>
            <div class="user-pill">
                <span id="activeUser">User</span>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </nav>

        <div id="alertHost"></div>
        <section id="content"></section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
