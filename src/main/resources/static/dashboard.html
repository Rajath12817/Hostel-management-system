<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hostel Management Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="https://play-lh.googleusercontent.com/y7AXjPJlOeTSLyvh96vjncTfO6OOIRXaOmSL830LNxiszIZCIKecvXjP4GXODX4EDULf=w480-h960-rw" alt="Campus">
            <div>
                <strong>HostelOps</strong>
                <span id="roleLabel">Dashboard</span>
            </div>
        </div>
        <nav id="sidebarNav" class="nav flex-column"></nav>
    </aside>

    <main class="main-content">
        <nav class="topbar">
            <button id="sidebarToggle" class="btn icon-btn" type="button" aria-label="Toggle sidebar">
                <i data-lucide="panel-left-close"></i>
            </button>
            <div>
                <p class="eyebrow mb-1">Hostel Management System</p>
                <h1 id="pageTitle">Dashboard</h1>
            </div>
            <div class="user-pill">
                <button id="themeToggle" class="btn icon-btn" type="button" aria-label="Toggle dark mode">
                    <i data-lucide="moon"></i>
                </button>
                <span id="activeUser">User</span>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </nav>

        <div id="alertHost"></div>
        <section id="content"></section>
    </main>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastHost"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
