<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hostel Management Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel">
        <div class="brand-row">
            <img src="https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=96&q=80" alt="Campus building">
            <div>
                <p class="eyebrow">Hostel Portal</p>
                <h1>Welcome back</h1>
            </div>
        </div>
        <p class="text-muted mb-4">Sign in to manage hostel applications, rooms, attendance, complaints, and payments.</p>
        <form id="loginForm" class="vstack gap-3">
            <div>
                <label class="form-label" for="email">Email</label>
                <input class="form-control form-control-lg" id="email" type="email" value="admin@hostel.com" required>
            </div>
            <div>
                <label class="form-label" for="password">Password</label>
                <input class="form-control form-control-lg" id="password" type="password" value="admin123" required>
            </div>
            <button class="btn btn-primary btn-lg w-100" type="submit">Login</button>
            <div id="loginError" class="alert alert-danger d-none mb-0"></div>
        </form>
        <div class="demo-logins">
            <span>Demo:</span>
            <button data-email="admin@hostel.com" data-password="admin123">Admin</button>
            <button data-email="warden@hostel.com" data-password="warden123">Warden</button>
            <button data-email="student@hostel.com" data-password="student123">Student</button>
        </div>
    </section>
    <section class="login-art">
        <div>
            <p>Clean workflows</p>
            <h2>Every approval, payment, and room action happens from tables and guided selections.</h2>
        </div>
    </section>
</main>
<script src="/js/login.js"></script>
</body>
</html>
